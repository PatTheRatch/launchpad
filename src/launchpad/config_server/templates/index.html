<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Launchpad Configuration</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="page">
    <header class="page-header">
      <h1>Launchpad</h1>
      <p class="subtitle">Dashboard configuration</p>
    </header>

    <div id="status" class="status" role="status" aria-live="polite"></div>

    <form id="config-form">
      <section class="card">
        <h2>Display</h2>

        <div class="field">
          <span class="field-label">Orientation</span>
          <div class="radio-group">
            <label class="radio">
              <input type="radio" name="orientation" value="portrait">
              <span>Portrait</span>
            </label>
            <label class="radio">
              <input type="radio" name="orientation" value="landscape">
              <span>Landscape</span>
            </label>
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="driver">Driver</label>
          <select id="driver" name="driver">
            <option value="mock">Mock (PNG file)</option>
            <option value="eink">E-ink panel</option>
          </select>
        </div>

        <div class="field-row">
          <div class="field">
            <label class="field-label" for="width">Width (px)</label>
            <input type="number" id="width" name="width" min="1" step="1" required>
          </div>
          <div class="field">
            <label class="field-label" for="height">Height (px)</label>
            <input type="number" id="height" name="height" min="1" step="1" required>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Refresh</h2>

        <div class="field">
          <label class="field-label" for="refresh_seconds">Refresh interval (seconds)</label>
          <input type="number" id="refresh_seconds" name="refresh_seconds" min="1" step="1" required>
        </div>

        <div class="preset-group">
          <button type="button" class="preset" data-seconds="60">60s</button>
          <button type="button" class="preset" data-seconds="300">5m</button>
          <button type="button" class="preset" data-seconds="600">10m</button>
          <button type="button" class="preset" data-seconds="1800">30m</button>
        </div>
      </section>

      <section class="card">
        <h2>Dashboard Mode</h2>
        <p class="card-hint">Force a specific mode instead of using the time-of-day schedule.</p>

        <div class="field">
          <label class="field-label" for="force_mode">Mode override</label>
          <select id="force_mode" name="force_mode">
            <option value="">Auto (time-based)</option>
            <option value="morning">Morning (07:00–09:00)</option>
            <option value="daytime">Daytime (09:00–17:00)</option>
            <option value="evening">Evening (17:00–22:00)</option>
            <option value="overnight">Overnight (22:00–07:00)</option>
          </select>
        </div>
      </section>

      <section class="card">
        <h2>Feature Flags</h2>

        <label class="toggle-row">
          <span>NBA</span>
          <span class="switch">
            <input type="checkbox" name="nba">
            <span class="slider"></span>
          </span>
        </label>

        <label class="toggle-row">
          <span>Fantasy Basketball</span>
          <span class="switch">
            <input type="checkbox" name="fantasy_basketball">
            <span class="slider"></span>
          </span>
        </label>

        <label class="toggle-row">
          <span>Baby Tracking</span>
          <span class="switch">
            <input type="checkbox" name="baby_tracking">
            <span class="slider"></span>
          </span>
        </label>

        <label class="toggle-row">
          <span>World Cup</span>
          <span class="switch">
            <input type="checkbox" name="world_cup">
            <span class="slider"></span>
          </span>
        </label>
      </section>

      <div class="actions">
        <button type="submit" class="btn btn-primary">Save</button>
        <button type="button" id="restart-btn" class="btn btn-danger">Restart Dashboard</button>
      </div>
    </form>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
